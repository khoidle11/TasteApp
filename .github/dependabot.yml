version: 2

updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/api"
      - "/apps/mobile"
      - "/apps/web"
      - "/packages/contracts"
      - "/packages/tsconfig"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      npm-patch-and-minor:
        group-by: "dependency-name"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
